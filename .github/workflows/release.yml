name: Release NexBoost

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Nettoyer le bundle cache
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "src-tauri/target/release/bundle" -ErrorAction SilentlyContinue
          Write-Host "Bundle précédent supprimé"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NexBoost ${{ github.ref_name }}'
          releaseBody: |
            ## NexBoost ${{ github.ref_name }}

            ### Installation
            Télécharge le fichier `.exe` ci-dessous et lance l'installation.

            ### Mise à jour automatique
            Si tu as déjà NexBoost installé, la mise à jour sera proposée automatiquement dans l'application.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Lister les fichiers bundle (debug)
        shell: pwsh
        run: |
          Write-Host "=== Contenu du dossier bundle ==="
          Get-ChildItem -Recurse "src-tauri/target/release/bundle/" | Select-Object -ExpandProperty FullName

      - name: Générer et uploader latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''

          # Chercher dynamiquement le .nsis.zip.sig
          $nsisZipSigFile = Get-ChildItem -Recurse "src-tauri/target/release/bundle/" -Filter "*.nsis.zip.sig" | Select-Object -First 1
          $nsisZipFile    = Get-ChildItem -Recurse "src-tauri/target/release/bundle/" -Filter "*.nsis.zip" |
                              Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1

          if (-not $nsisZipSigFile) {
            # Fallback : utiliser le .exe.sig si pas de .nsis.zip.sig
            Write-Host "Pas de .nsis.zip.sig trouvé, fallback sur .exe.sig"
            $exeSigFile  = Get-ChildItem -Recurse "src-tauri/target/release/bundle/" -Filter "*-setup.exe.sig" | Select-Object -First 1
            $exeFile     = Get-ChildItem -Recurse "src-tauri/target/release/bundle/" -Filter "*-setup.exe" |
                             Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
            $signature   = (Get-Content $exeSigFile.FullName -Raw).Trim()
            $uploadFile  = $exeFile.FullName
            $assetName   = $exeFile.Name
          } else {
            Write-Host "Trouvé : $($nsisZipSigFile.FullName)"
            $signature  = (Get-Content $nsisZipSigFile.FullName -Raw).Trim()
            $uploadFile = $nsisZipFile.FullName
            $assetName  = $nsisZipFile.Name
          }

          # Upload le fichier de mise à jour
          gh release upload $tag $uploadFile --clobber

          $downloadUrl = "https://github.com/Klovy-Dev/nexboost/releases/download/$tag/$assetName"
          $pubDate     = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")

          # Construire latest.json
          $payload = [ordered]@{
            version  = $version
            notes    = "NexBoost $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = $downloadUrl
              }
            }
          }
          $payload | ConvertTo-Json -Depth 10 | Out-File "latest.json" -Encoding UTF8NoBOM
          Write-Host "=== latest.json ==="
          Get-Content "latest.json"

          gh release upload $tag "latest.json" --clobber
          Write-Host "latest.json uploadé avec succès !"

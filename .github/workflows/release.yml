name: Release NexBoost

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Nettoyer le bundle cache
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "src-tauri/target/release/bundle" -ErrorAction SilentlyContinue

      - name: Écrire la clé de signature dans un fichier
        shell: pwsh
        env:
          KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $keyBytes = [Convert]::FromBase64String($env:KEY_B64.Trim())
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\signing.key", $keyBytes)
          "TAURI_SIGNING_PRIVATE_KEY=$env:RUNNER_TEMP\signing.key" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Clé de signature écrite dans : $env:RUNNER_TEMP\signing.key"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NexBoost ${{ github.ref_name }}'
          releaseBody: |
            ## NexBoost ${{ github.ref_name }}

            ### Installation
            Télécharge le fichier `.exe` ci-dessous et lance l'installation.

            ### Mise à jour automatique
            Si tu as déjà NexBoost installé, la mise à jour sera proposée automatiquement dans l'application.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Lister les fichiers bundle
        shell: pwsh
        run: |
          Write-Host "=== Contenu du dossier bundle ==="
          Get-ChildItem -Recurse "src-tauri/target/release/bundle/" | Select-Object -ExpandProperty FullName

      - name: Générer et uploader latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''

          # Chercher les fichiers signés
          $nsisZipSig = Get-ChildItem -Recurse "src-tauri/target/release/bundle/" -Filter "*.nsis.zip.sig" | Select-Object -First 1
          $nsisZip    = Get-ChildItem -Recurse "src-tauri/target/release/bundle/" -Filter "*.nsis.zip" |
                          Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1

          if ($nsisZipSig) {
            Write-Host "Fichier signé trouvé : $($nsisZip.FullName)"
            $signature  = (Get-Content $nsisZipSig.FullName -Raw).Trim()
            $uploadFile = $nsisZip.FullName
            $assetName  = $nsisZip.Name
          } else {
            # Fallback : signer manuellement le .exe avec tauri signer
            Write-Host "Pas de .nsis.zip.sig — signature manuelle du .exe"
            $exeFile = Get-ChildItem -Recurse "src-tauri/target/release/bundle/" -Filter "*-setup.exe" |
                         Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
            Write-Host "Signature de : $($exeFile.FullName)"
            npx tauri signer sign -k "$env:RUNNER_TEMP\signing.key" --password "" "$($exeFile.FullName)"
            $sigFile    = "$($exeFile.FullName).sig"
            $signature  = (Get-Content $sigFile -Raw).Trim()
            $uploadFile = $exeFile.FullName
            $assetName  = $exeFile.Name
          }

          # Upload le fichier de mise à jour
          gh release upload $tag $uploadFile --clobber

          $downloadUrl = "https://github.com/Klovy-Dev/nexboost/releases/download/$tag/$assetName"
          $pubDate     = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")

          $payload = [ordered]@{
            version  = $version
            notes    = "NexBoost $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = $downloadUrl
              }
            }
          }
          $payload | ConvertTo-Json -Depth 10 | Out-File "latest.json" -Encoding UTF8NoBOM
          Write-Host "=== latest.json ==="
          Get-Content "latest.json"

          gh release upload $tag "latest.json" --clobber
          Write-Host "latest.json uploadé !"

name: Release NexBoost

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      # Écrire la clé dans un fichier et passer son CHEMIN à Tauri
      # C'est la méthode la plus fiable : Tauri lit le fichier directement
      - name: Decode signing key
        shell: pwsh
        env:
          KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $keyPath  = "$env:RUNNER_TEMP\nexboost.key"
          $keyBytes = [Convert]::FromBase64String($env:KEY_B64.Trim())
          [IO.File]::WriteAllBytes($keyPath, $keyBytes)
          Write-Host "Cle ecrite : $keyPath ($($keyBytes.Length) octets)"
          "TAURI_SIGNING_PRIVATE_KEY=$keyPath"   | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD="  | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Tauri app
        shell: pwsh
        run: npm run tauri build

      - name: Create GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''

          Write-Host "=== Contenu bundle ==="
          Get-ChildItem -Recurse "src-tauri/target/release/bundle" | ForEach-Object { $_.FullName }

          $exe     = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" `
                       -Filter "*_x64-setup.exe" | Select-Object -First 1
          $nsisZip = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" `
                       -Filter "*.nsis.zip" |
                       Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $sigFile = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" `
                       -Filter "*.nsis.zip.sig" | Select-Object -First 1

          if (-not $exe)     { throw "setup.exe introuvable" }
          if (-not $nsisZip) { throw ".nsis.zip introuvable — la signature a-t-elle fonctionne ?" }
          if (-not $sigFile) { throw ".nsis.zip.sig introuvable" }

          $signature   = (Get-Content $sigFile.FullName -Raw).Trim()
          $downloadUrl = "https://github.com/Klovy-Dev/nexboost/releases/download/$tag/$($nsisZip.Name)"
          $pubDate     = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")

          [ordered]@{
            version  = $version
            notes    = "NexBoost $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 10 | Out-File "latest.json" -Encoding UTF8NoBOM

          Write-Host "=== latest.json ==="
          Get-Content "latest.json"

          gh release create $tag `
            --title "NexBoost $tag" `
            --notes "NexBoost $tag" `
            $exe.FullName `
            $nsisZip.FullName `
            "latest.json"

          Write-Host "Release creee avec succes !"

name: Release NexBoost

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_TURSO_URL: ${{ secrets.VITE_TURSO_URL }}
          VITE_TURSO_TOKEN: ${{ secrets.VITE_TURSO_TOKEN }}
        run: npm run tauri build

      # Renommer les artefacts + signer si besoin
      - name: Prepare release artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $nsisDir = "src-tauri/target/release/bundle/nsis"

          # -- EXE : renommer en NexBoost-{version}-setup.exe --
          $exe = Get-ChildItem $nsisDir -Filter "*_x64-setup.exe" | Select-Object -First 1
          if (-not $exe) { throw "setup.exe introuvable dans $nsisDir" }

          $newExeName = "NexBoost-$version-setup.exe"
          $newExePath = Join-Path $nsisDir $newExeName
          Rename-Item $exe.FullName -NewName $newExeName
          Write-Host "EXE -> $newExeName"

          # -- ZIP + SIG : tauri build signe automatiquement si la clé est présente --
          $existingSig = Get-ChildItem $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1

          $newZipName = "NexBoost-$version-setup.nsis.zip"
          $newZipPath = Join-Path $nsisDir $newZipName

          if ($existingSig) {
            Write-Host "Auto-signé par tauri build — renommage"
            $existingZip = Get-ChildItem $nsisDir -Filter "*.nsis.zip" |
                             Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1

            Rename-Item $existingZip.FullName -NewName $newZipName
            Rename-Item $existingSig.FullName -NewName "$newZipName.sig"
          } else {
            Write-Host "Signature manuelle..."
            # Compress-Archive utilise Deflate64 (méthode 9) non supporté par Tauri.
            # On utilise System.IO.Compression qui produit du Deflate standard (méthode 8).
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            $zipArchive = [System.IO.Compression.ZipFile]::Open($newZipPath, [System.IO.Compression.ZipArchiveMode]::Create)
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
              $zipArchive, $newExePath, $newExeName,
              [System.IO.Compression.CompressionLevel]::Optimal
            )
            $zipArchive.Dispose()
            Write-Host "ZIP cree : $newZipName"

            npm run tauri -- signer sign -k $env:TAURI_SIGNING_PRIVATE_KEY $newZipPath
            if ($LASTEXITCODE -ne 0) { throw "Signature echouee (exit $LASTEXITCODE)" }
            if (-not (Test-Path "$newZipPath.sig")) { throw ".sig introuvable apres signature" }
            Write-Host "Signature OK"
          }

          Write-Host "=== Artefacts finaux ==="
          Get-ChildItem $nsisDir | ForEach-Object { Write-Host "  $($_.Name)" }

      # Créer le latest.json et publier la release GitHub
      - name: Create GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $nsisDir = "src-tauri/target/release/bundle/nsis"

          $newExeName = "NexBoost-$version-setup.exe"
          $newZipName = "NexBoost-$version-setup.nsis.zip"
          $newSigName = "$newZipName.sig"

          $exePath = Join-Path $nsisDir $newExeName
          $zipPath = Join-Path $nsisDir $newZipName
          $sigPath = Join-Path $nsisDir $newSigName

          if (-not (Test-Path $exePath)) { throw "EXE introuvable : $exePath" }
          if (-not (Test-Path $zipPath)) { throw "ZIP introuvable : $zipPath" }
          if (-not (Test-Path $sigPath)) { throw "SIG introuvable : $sigPath" }

          $signature   = (Get-Content $sigPath -Raw).Trim()
          $downloadUrl = "https://github.com/Klovy-Dev/nexboost/releases/download/$tag/$newZipName"
          $pubDate     = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")

          [ordered]@{
            version  = $version
            notes    = "NexBoost $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 10 | Out-File "latest.json" -Encoding UTF8NoBOM

          Write-Host "=== latest.json ===" ; Get-Content "latest.json"

          gh release create $tag `
            --title "NexBoost $tag" `
            --notes "NexBoost $tag" `
            $exePath `
            $zipPath `
            "latest.json"

          Write-Host "Release creee !"
